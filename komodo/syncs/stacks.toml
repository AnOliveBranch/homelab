##

[[stack]]
name = "authentication"
description = "Authentik stack"
deploy = true
tags = ["infra"]
[stack.config]
auto_update = true
server = "vm-docker-01"
links = ["https://docs.goauthentik.io/"]

# Git configuration
git_provider = "github.com"
repo = "AnOliveBranch/homelab"
branch = "main"
run_directory = "komodo/stacks"
file_paths = ["authentik-compose.yaml"]

##

[[stack]]
name = "dns"
description = "Technitium DNS Server"
deploy = true
tags = ["infra", "networking"]
[stack.config]
auto_update = true
server = "vm-docker-01"
links = ["https://technitium.com/dns/"]
environment = """
  DNS_SERVER_DOMAIN=ns0.dns.home.anolivebranch.dev
"""

# Git configuration
git_provider = "github.com"
repo = "AnOliveBranch/homelab"
branch = "main"
run_directory = "komodo/stacks"
file_paths = ["technitium-compose.yaml"]

##

[[stack]]
name = "servarr"
