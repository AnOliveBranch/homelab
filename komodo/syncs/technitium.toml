##

[[deployment]]
name = "technitium"
description = "Technitium DNS Server"
tags = ["networking"]
# sync will deploy the container:
#  - if it is not running.
#  - has relevant config updates.
#  - the attached build has new version.
deploy = true
[deployment.config]
server = "boethiah"
links = ["https://technitium.com/dns/"]
# Docker image
image.type = "Image"
image.params.image = "docker.io/technitium/dns-server:latest"
# Standard
poll_for_updates = true
restart = "unless-stopped"
# set the volumes / bind mounts
volumes = """
technitium-config:/etc/dns
technitium-logs:/var/log/technitium/dns
"""
# Port mapping
ports = """
5380:5380
53443:53443
53:53/tcp
53:53/udp
"""
network = "networking-boethiah_technitium-net"
