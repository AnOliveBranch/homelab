services:
  #  Download clients
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - qbittorrent-config:/config
      - /mnt/servarr/torrents:/data/torrents
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - nzbget-config:/config
      - /mnt/servarr/usenet:/data/usenet
    ports:
      - 6789:6789
    restart: unless-stopped
  # Index Manager
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - prowlarr-config:/config
    ports:
      - 9696:9696
    restart: unless-stopped 
  # Get around CloudFlare protection
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      TZ: America/Chicago
    ports:
      - 8191:8191
    restart: unless-stopped 
  # Media Management
  # Movies
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - radarr-config:/config
      - /mnt/servarr:/data
    ports:
      - 7878:7878
    restart: unless-stopped
  # TV Shows
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - sonarr-config:/config
      - /mnt/servarr:/data
    ports:
      - 8989:8989
    restart: unless-stopped
  # Music
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - lidarr-config:/config
      - /mnt/servarr:/data
    ports:
      - 8686:8686
    restart: unless-stopped
  # Subtitles
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Chicago
    volumes:
      - bazarr-config:/config
      - /mnt/servarr:/data
    ports:
      - 6767:6767
    restart: unless-stopped

volumes:
  qbittorrent-config:
  nzbget-config:
  prowlarr-config:
  sonarr-config:
  radarr-config:
  lidarr-config:
  bazarr-config:
