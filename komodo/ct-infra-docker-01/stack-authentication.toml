[[stack]]
name = "authentication"
[stack.config]
server = "ct-infra-docker-01"
links = [
  "https://docs.goauthentik.io/",
  "https://integrations.goauthentik.io/"
]
poll_for_updates = true
file_contents = """
services:
  authentik-postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: [[AUTHENTIK_POSTGRES_DB_NAME]]
      POSTGRES_USER: [[AUTHENTIK_POSTGRES_DB_USER]]
      POSTGRES_PASSWORD: [[AUTHENTIK_POSTGRES_DB_PASSWORD]]
    volumes:
      - authentik-db:/var/lib/postgresql/data
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD-SHELL
        - pg_isready -d [[AUTHENTIK_POSTGRES_DB_NAME]] -U [[AUTHENTIK_POSTGRES_DB_USER]]
      timeout: 5s
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.3
    command: server
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: [[AUTHENTIK_SERVER_SECRET_KEY]]
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: [[AUTHENTIK_POSTGRES_DB_NAME]]
      AUTHENTIK_POSTGRESQL__USER: [[AUTHENTIK_POSTGRES_DB_USER]]
      AUTHENTIK_POSTGRESQL__PASSWORD: [[AUTHENTIK_POSTGRES_DB_PASSWORD]]
      AUTHENTIK_EMAIL__USE_TLS: true
      AUTHENTIK_EMAIL__HOST: [[GLOBAL_SMTP_HOST]]
      AUTHENTIK_EMAIL__PORT: [[GLOBAL_SMTP_PORT]]
      AUTHENTIK_EMAIL__USERNAME: [[GLOBAL_SMTP_USERNAME]]
      AUTHENTIK_EMAIL__FROM: [[GLOBAL_SMTP_USERNAME]]
      AUTHENTIK_EMAIL__PASSWORD: [[AUTHENTIK_SMTP_PASSWORD]]
    ports:
      - 9000:9000
      - 9443:9443
    depends_on:
      authentik-postgres:
        condition: service_healthy
    shm_size: 512mb
    volumes:
      - authentik-data:/data
      - authentik-templates:/templates
      - authentik-media:/media
  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.3
    command: worker
    restart: unless-stopped
    environment:
      AUTHENTIK_SECRET_KEY: [[AUTHENTIK_SERVER_SECRET_KEY]]
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: [[AUTHENTIK_POSTGRES_DB_NAME]]
      AUTHENTIK_POSTGRESQL__USER: [[AUTHENTIK_POSTGRES_DB_USER]]
      AUTHENTIK_POSTGRESQL__PASSWORD: [[AUTHENTIK_POSTGRES_DB_PASSWORD]]
      AUTHENTIK_EMAIL__USE_TLS: true
      AUTHENTIK_EMAIL__HOST: [[GLOBAL_SMTP_HOST]]
      AUTHENTIK_EMAIL__PORT: [[GLOBAL_SMTP_PORT]]
      AUTHENTIK_EMAIL__USERNAME: [[GLOBAL_SMTP_USERNAME]]
      AUTHENTIK_EMAIL__FROM: [[GLOBAL_SMTP_USERNAME]]
      AUTHENTIK_EMAIL__PASSWORD: [[AUTHENTIK_SMTP_PASSWORD]]
    shm_size: 512mb
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik-data:/data
      - authentik-certs:/certs
      - authentik-templates:/templates
    depends_on:
      authentik-postgres:
        condition: service_healthy
  authentik-nginx-outpost:
    image: ghcr.io/goauthentik/proxy:2026.2.3
    restart: unless-stopped
    environment:
      AUTHENTIK_INSECURE: "false"
      AUTHENTIK_HOST: [[AUTHENTIK_HOST]]
      AUTHENTIK_TOKEN: [[AUTHENTIK_NGINX_OUTPOST_TOKEN]]
    networks:
      - ak-nginx-proxy

networks:
  # Use proxy network defined in networking stack
  ak-nginx-proxy:
    name: networking_ak-nginx-proxy
    external: true

volumes:
  authentik-db:
    driver: local
  authentik-data:
  authentik-certs:
  authentik-templates:
  authentik-media:
"""
