[[stack]]
name = "networking"
[stack.config]
server = "ct-infra-docker-01"
links = [
  "https://github.com/TechnitiumSoftware/DnsServer",
  "https://github.com/NginxProxyManager/nginx-proxy-manager"
]
poll_for_updates = true
file_contents = """
services:
  technitium:
    image: docker.io/technitium/dns-server:latest
    restart: unless-stopped
    ports:
      - 5380:5380
      - 53443:53443
      - 53:53/tcp
      - 53:53/udp
    networks:
      - technitium-net
    volumes:
      - technitium-config:/etc/dns
      - technitium-logs:/var/log/technitium/dns
  nginx-proxy-manager:
    image: docker.io/jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    environment:
      TZ: [[GLOBAL_TIMEZONE]]
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
      - '8443:8443'
    volumes:
      - nginx-data:/data
      - nginx-certs:/etc/letsencrypt
    networks:
      - technitium-net
      - ak-nginx-proxy

networks:
  technitium-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "[[TECHNITIUM_IPV6_PREFIX]]::/64"
          gateway: "[[TECHNITIUM_IPV6_PREFIX]]::1"
  # Define authentik-nginx proxy network
  ak-nginx-proxy:

volumes:
    technitium-config:
    technitium-logs:
    nginx-data:
    nginx-certs:
"""
environment = """
  # VARIABLE = value
"""
