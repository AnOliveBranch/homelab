[[stack]]
name = "networking-boethiah"
[stack.config]
server = "boethiah"
poll_for_updates = true
file_contents = """
services:
  technitium:
    image: docker.io/technitium/dns-server:latest
    restart: unless-stopped
    ports:
      - 5380:5380
      - 53443:53443
      - 53:53/tcp
      - 53:53/udp
    networks:
      - technitium-net
    volumes:
      - technitium-config:/etc/dns
      - technitium-logs:/var/log/technitium/dns

networks:
  technitium-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: "[[TECHNITIUM_BOETHIAH_IPV6_PREFIX]]::/64"
          gateway: "[[TECHNITIUM_BOETHIAH_IPV6_PREFIX]]::1"

volumes:
    technitium-config:
    technitium-logs:
"""
