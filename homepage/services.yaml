          key: "{{HOMEPAGE_VAR_LIDARR_API_KEY}}"
    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_BAZARR_HOST}}"
        description: Subtitle Manager
        proxmoxNode: proxmox
