---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Hosts:
    - UniFi Gateway:
        icon: ubiquiti-unifi.png
        href: https://router.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_ROUTER_HOST}}"
        description: Router
        widget:
          type: unifi
          url: "{{HOMEPAGE_VAR_ROUTER_HOST}}"
          key: "{{HOMEPAGE_VAR_UNIFI_API_KEY}}"
    - Proxmox:
        icon: proxmox.png
        href: https://proxmox.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_PROXMOX_HOST}}"
        description: Hypervisor
        widget:
          type: proxmox
          url: "{{HOMEPAGE_VAR_PROXMOX_HOST}}"
          username: "{{HOMEPAGE_VAR_PROXMOX_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PROXMOX_PASSWORD}}"
    - TrueNAS:
        icon: truenas.png
        href: https://truenas.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_TRUENAS_HOST}}"
        description: NAS
        widget:
          type: truenas
          url: "{{HOMEPAGE_VAR_TRUENAS_HOST}}"
          version: 2
          key: "{{HOMEPAGE_VAR_TRUENAS_API_KEY}}"
          enablePools: true
          nasType: scale
- Infrastructure:
    - Authentik:
        icon: authentik.png
        href: https://auth.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_AUTHENTIK_HOST}}"
        description: Authentication Provider
        widget:
          type: authentik
          url: "{{HOMEPAGE_VAR_AUTHENTIK_HOST}}"
          key: "{{HOMEPAGE_VAR_AUTHENTIK_API_KEY}}"
          version: 2
    - Pihole (Primary):
        icon: pi-hole.png
        href: https://pihole.home.anolivebranch.dev/admin
        siteMonitor: "{{HOMEPAGE_VAR_PIHOLE_PRIMARY_HOST}}"
        description: Primary DNS Server
        widget:
          type: pihole
          url: "{{HOMEPAGE_VAR_PIHOLE_PRIMARY_HOST}}"
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_PRIMARY_API_KEY}}"
    - Pihole (Secondary):
        icon: pi-hole.png
        href: https://pihole-secondary.home.anolivebranch.dev/admin
        siteMonitor: "{{HOMEPAGE_VAR_PIHOLE_SECONDARY_HOST}}"
        description: Backup DNS Server
        widget:
          type: pihole
          url: "{{HOMEPAGE_VAR_PIHOLE_SECONDARY_HOST}}"
          version: 6
          key: "{{HOMEPAGE_VAR_PIHOLE_SECONDARY_API_KEY}}"
    - PeaNUT:
        icon: peanut.png
        href: https://peanut.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_PEANUT_HOST}}"
        description: UPS Status
        widget:
          type: peanut
          url: "{{HOMEPAGE_VAR_PEANUT_HOST}}"
          key: "{{HOMEPAGE_VAR_PEANUT_UPS_NAME}}"
          username: "{{HOMEPAGE_VAR_PEANUT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_PEANUT_PASSWORD}}"
    - Nginx (internal):
        icon: nginx-proxy-manager.png
        href: https://nginx.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_NGINX_HOST}}"
        description: Reverse Proxy Manager
        widget:
          type: npm
          url: "{{HOMEPAGE_VAR_NGINX_HOST}}"
          username: "{{HOMEPAGE_VAR_NGINX_USERNAME}}"
          password: "{{HOMEPAGE_VAR_NGINX_PASSWORD}}"
- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: https://jellyfin.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_JELLYFIN_HOST}}"
        description: Media Server
        proxmoxNode: proxmox
        proxmoxVMID: 115
        proxmoxType: lxc
        widget:
          type: jellyfin
          url: "{{HOMEPAGE_VAR_JELLYFIN_HOST}}"
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
          enableNowPlaying: true
          enableUser: true
          enableMediaControl: false
          showEpisodeNumber: true
          expandOneStreamToTwoRows: false
    - Jellyseerr:
        icon: jellyseerr.png
        href: https://jellyseer.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_JELLYSEER_HOST}}"
        description: Media Requests
        proxmoxNode: proxmox
        proxmoxVMID: 116
        proxmoxType: qemu
        widget:
          type: jellyseerr
          url: "{{HOMEPAGE_VAR_JELLYSEER_HOST}}"
          key: "{{HOMEPAGE_VAR_JELLYSEER_API_KEY}}"
    - StreamyStats:
        icon: sh-streamystats
        href: https://streamystats.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_STREAMYSTATS_HOST}}"
        description: Jellyfin Statistics
        proxmoxNode: proxmox
        proxmoxVMID: 116
        proxmoxType: qemu
    - Immich:
        icon: immich.png
        href: https://immich.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_IMMICH_HOST}}"
        description: Photo Library
        proxmoxNode: proxmox
        proxmoxVMID: 103
        proxmoxType: lxc
        widget:
          type: immich
          url: "{{HOMEPAGE_VAR_IMMICH_HOST}}"
          key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
          version: 2
- Household:
    - Mealie:
        icon: mealie.png
        href: https://mealie.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_MEALIE_HOST}}"
