- Download Clients:
    - qBittorrent:
        icon: qbittorrent.png
        href: https://qbittorrent.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_QBITTORRENT_HOST}}"
        description: Download client (torrents)
        proxmoxNode: proxmox
        proxmoxVMID: 116
        proxmoxType: qemu
        widget:
          type: qbittorrent
          url: "{{HOMEPAGE_VAR_QBITTORRENT_HOST}}"
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
          enableLeechProgress: false
          enableLeechSize: false
    - NZBget:
        icon: nzbget.png
        href: https://nzbget.home.anolivebranch.dev
        siteMonitor: "{{HOMEPAGE_VAR_NZBGET_HOST}}"
        description: Download client (usenet)
        proxmoxNode: proxmox
        proxmoxVMID: 116
        proxmoxType: qemu
